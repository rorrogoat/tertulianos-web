  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

df8\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"455754a8-19ba-4bbb-b643-8baebba42044\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"ecd3b1d3-3046-4049-94e7-6199f953cadb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* TERTULIANOS · Manual de Marca */\n\n:root {\n  --paper:        oklch(0.957 0.012 80);\n  --paper-2:      oklch(0.928 0.018 75);\n  --cream:        oklch(0.895 0.022 75);\n  --bone:         oklch(0.83 0.025 75);\n  --linen:        oklch(0.78 0.030 70);\n\n  --cocoa:        oklch(0.30 0.045 50);\n  --espresso:     oklch(0.20 0.020 50);\n  --ink:          oklch(0.16 0.012 60);\n\n  --mahogany:     oklch(0.40 0.075 35);\n  --terracotta:   oklch(0.58 0.115 38);\n\n  --saffron:      oklch(0.72 0.135 75);\n  --curcuma:      oklch(0.70 0.155 80);\n  --mole:         oklch(0.34 0.090 25);\n  --perejil:      oklch(0.42 0.075 130);\n  --tomate:       oklch(0.55 0.165 28);\n\n  --rule:         color-mix(in oklch, var(--ink) 18%, transparent);\n  --rule-strong:  color-mix(in oklch, var(--ink) 35%, transparent);\n\n  --serif: \"Cormorant Garamond\", \"EB Garamond\", Georgia, serif;\n  --sans:  \"DM Sans\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n  --mono:  \"JetBrains Mono\", \"IBM Plex Mono\", ui-monospace, monospace;\n\n  --maxw: 1240px;\n  --gut:  72px;\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0; padding: 0;\n  background: var(--paper);\n  color: var(--ink);\n  font-family: var(--sans);\n  font-size: 16px; line-height: 1.55;\n  font-feature-settings: \"ss01\", \"kern\", \"liga\";\n  text-rendering: optimizeLegibility;\n  -webkit-font-smoothing: antialiased;\n}\nimg { max-width: 100%; display: block; }\n\nbody::before {\n  content: \"\";\n  position: fixed; inset: 0;\n  pointer-events: none; z-index: 100;\n  opacity: 0.32; mix-blend-mode: multiply;\n  background-image:\n    radial-gradient(1.2px 1.2px at 20% 30%, rgba(60,40,20,0.05), transparent 60%),\n    radial-gradient(1px 1px at 80% 70%, rgba(60,40,20,0.06), transparent 60%),\n    radial-gradient(1.5px 1.5px at 50% 50%, rgba(60,40,20,0.04), transparent 60%);\n  background-size: 120px 120px, 90px 90px, 160px 160px;\n}\n\n.spread { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gut); }\n.section { padding: 140px 0 60px; position: relative; }\n.section + .section { border-top: 1px solid var(--rule); }\n\n/* Section header */\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 11px; font-weight: 500;\n  letter-spacing: 0.18em; text-transform: uppercase;\n  color: color-mix(in oklch, var(--ink) 60%, transparent);\n}\n.eyebrow .num { color: var(--mahogany); margin-right: 16px; }\n\n.section-title {\n  font-family: var(--serif);\n  font-weight: 300;\n  font-size: clamp(56px, 7vw, 96px);\n  line-height: 0.95; letter-spacing: -0.015em;\n  margin: 28px 0 0; text-wrap: balance;\n}\n.section-title em { font-style: italic; font-weight: 300; color: var(--mahogany); }\n\n.section-lede {\n  font-family: var(--serif);\n  font-style: italic; font-weight: 400;\n  font-size: clamp(20px, 1.6vw, 24px); line-height: 1.45;\n  color: color-mix(in oklch, var(--ink) 75%, transparent);\n  max-width: 56ch; margin: 36px 0 0; text-wrap: pretty;\n}\n\n/* Grid */\n.g12 { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }\n.g4  { display: grid; grid-template-columns: repeat(4, 1fr);  gap: 20px; }\n.g3  { display: grid; grid-template-columns: repeat(3, 1fr);  gap: 24px; }\n.g2  { display: grid; grid-template-columns: repeat(2, 1fr);  gap: 32px; }\n.col-3 { grid-column: span 3; } .col-4 { grid-column: span 4; }\n.col-5 { grid-column: span 5; } .col-6 { grid-column: span 6; }\n.col-7 { grid-column: span 7; } .col-8 { grid-column: span 8; }\n.col-12 { grid-column: span 12; }\n.stack-md > * + * { margin-top: 28px; }\n.stack-lg > * + * { margin-top: 56px; }\n\n.cap {\n  font-family: var(--mono);\n  font-size: 11px; letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: color-mix(in oklch, var(--ink) 55%, transparent);\n}\n\n/* COVER */\n.cover {\n  background: var(--ink); color: var(--paper);\n  min-height: 100vh; padding: 56px var(--gut) 56px;\n  position: relative; overflow: hidden;\n}\n.cover::before {\n  content: \"\"; position: absolute; inset: 0;\n  background:\n    radial-gradient(ellipse at 50% 40%, color-mix(in oklch, var(--mahogany) 25%, transparent), transparent 65%),\n    radial-gradient(ellipse at 80% 90%, color-mix(in oklch, var(--cocoa) 35%, transparent), transparent 65%);\n  pointer-events: none;\n}\n.cover-inner {\n  position: relative;\n  display: grid; grid-template-rows: auto 1fr auto;\n  height: calc(100vh - 112px); min-height: 720px;\n}\n.cover-top, .cover-bottom {\n  display: flex; justify-content: space-between; align-items: flex-start;\n  font-family: var(--mono); font-size: 11px;\n  letter-spacing: 0.18em; text-transform: uppercase;\n  color: color-mix(in oklch, var(--paper) 65%, transparent);\n}\n.cover-bottom { align-items: flex-end; }\n.cover-mid {\n  align-self: center;\n  display: grid; grid-template-columns: 1fr auto;\n  align-items: end; gap: 60px;\n}\n.cover-T {\n  font-family: var(--serif); font-weight: 300;\n  font-size: clamp(220px, 32vw, 440px); line-height: 0.78;\n  letter-spacing: -0.04em; color: var(--paper); margin: 0;\n}\n.cover-T em {\n  font-style: italic; font-weight: 300;\n  color: color-mix(in oklch, var(--saffron) 92%, var(--paper));\n}\n.cover-meta { text-align: right; font-family: var(--serif); }\n.cover-meta .label {\n  font-family: var(--mono); font-size: 10px;\n  letter-spacing: 0.2em; text-transform: uppercase;\n  color: color-mix(in oklch, var(--paper) 50%, transparent);\n  margin-bottom: 8px;\n}\n.cover-meta .val {\n  font-size: 22px; font-style: italic; font-weight: 300;\n  color: color-mix(in oklch, var(--paper) 90%, transparent);\n}\n.cover-meta + .cover-meta { margin-top: 28px; }\n.cc { position: absolute; width: 22px; height: 22px;\n  border: 1px solid color-mix(in oklch, var(--paper) 40%, transparent); }\n.cc.tl { top: 28px; left: 28px; border-right: 0; border-bottom: 0; }\n.cc.tr { top: 28px; right: 28px; border-left: 0; border-bottom: 0; }\n.cc.bl { bottom: 28px; left: 28px; border-right: 0; border-top: 0; }\n.cc.br { bottom: 28px; right: 28px; border-left: 0; border-top: 0; }\n\n/* INDEX */\n.index-list { list-style: none; margin: 0; padding: 0; }\n.index-list li {\n  display: grid; grid-template-columns: 80px 1fr auto;\n  gap: 32px; align-items: baseline;\n  padding: 22px 0; border-top: 1px solid var(--rule);\n}\n.index-list li:last-child { border-bottom: 1px solid var(--rule); }\n.index-list .num {\n  font-family: var(--mono); font-size: 12px;\n  letter-spacing: 0.18em; color: var(--mahogany);\n}\n.index-list .ttl {\n  font-family: var(--serif); font-size: 30px; font-weight: 300;\n  letter-spacing: -0.005em;\n}\n.index-list .ttl em { font-style: italic; color: var(--mahogany); }\n.index-list .pg {\n  font-family: var(--mono); font-size: 12px; letter-spacing: 0.12em;\n  color: color-mix(in oklch, var(--ink) 55%, transparent);\n}\n\n/* MANIFIESTO */\n.manifesto {\n  font-family: var(--serif); font-weight: 300;\n  font-size: clamp(28px, 2.6vw, 38px);\n  line-height: 1.32; letter-spacing: -0.005e n\n.size-row {\n  display: flex; align-items: end; justify-content: space-around;\n  gap: 32px; padding: 40px 32px;\n  background: var(--paper-2); border: 1px solid var(--rule);\n}\n.size-row .item { text-align: center; }\n.size-row .item img { margin: 0 auto; }\n.size-row .item .lbl {\n  font-family: var(--mono); font-size: 10.5px;\n  letter-spacing: 0.14em; text-transform: uppercase;\n  color: color-mix(in oklch, var(--ink) 60%, transparent);\n  margin-top: 14px;\n}\n\n.donts {\n  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;\n}\n.dont-card {\n  border: 1px solid var(--rule); background: var(--paper-2);\n  aspect-ratio: 1; position: relative; padding: 18px;\n  display: grid; place-items: center;\n}\n.dont-card .x, .dont-card .ok {\n  position: absolute; top: 12px; left: 12px;\n  font-family: var(--mono); font-size: 11px;\n  letter-spacing: 0.18em;\n}\n.dont-card .x { color: var(--tomate); }\n.dont-card .ok { color: var(--perejil); }\n.dont-card .lbl {\n  position: absolute; bottom: 14px; left: 14px; right: 14px;\n  font-family: var(--mono); font-size: 10px;\n  letter-spacing: 0.1em; text-transform: uppercase;\n  color: color-mix(in oklch, var(--ink) 70%, transparent);\n}\n.dont-card img { max-width: 60%; max-height: 60%; }\n.dont-card.tilt img { transform: rotate(15deg); }\n.dont-card.stretched img { transform: scaleX(1.55); }\n.dont-card.ghost img { opacity: 0.3; }\n.dont-card.recolor img { filter: hue-rotate(180deg) saturate(2.2); }\n.dont-card.busybg {\n  background:\n    repeating-linear-gradient(45deg, color-mix(in oklch, var(--tomate) 90%, transparent) 0 8px, color-mix(in oklch, var(--saffron) 80%, transparent) 8px 16px);\n}\n.dont-card.busybg img { background: transparent; }\n.dont-card.outline img { filter: invert(1) brightness(2); opacity: 0.5; }\n\n/* COLOR */\n.swatch {\n  display: grid; grid-template-rows: 1fr auto;\n  border: 1px solid var(--rule);\n  background: var(--paper); overflow: hidden;\n  min-height: 240px;\n}\n.swatch .chi r-spacing: 0.14em; text-transform: uppercase;\n  color: color-mix(in oklch, var(--ink) 55%, transparent);\n  display: block; margin-top: 2px;\n}\n\n.scale-row {\n  display: grid; grid-template-columns: 130px 1fr 230px;\n  align-items: baseline; gap: 32px;\n  padding: 22px 0; border-top: 1px solid var(--rule);\n}\n.scale-row:last-child { border-bottom: 1px solid var(--rule); }\n.scale-row .lbl {\n  font-family: var(--mono); font-size: 11px;\n  letter-spacing: 0.16em; text-transform: uppercase;\n  color: color-mix(in oklch, var(--ink) 60%, transparent);\n}\n.scale-row .specs {\n  font-family: var(--mono); font-size: 11px;\n  letter-spacing: 0.04em; text-align: right; line-height: 1.7;\n  color: color-mix(in oklch, var(--ink) 70%, transparent);\n}\n.scale-row .sample em { font-style: italic; color: var(--mahogany); }\n\n/* VOZ */\n.voice {\n  display: grid; grid-template-columns: 1fr 1fr; gap: 0;\n  border: 1px solid var(--rule);\n}\n.voice > div {\n  padding: 32px 32px 36px; background: var(--paper-2);\n}\n.voice > div + div { border-left: 1px solid var(--rule); }\n.voice .hd {\n  display: flex; justify-content: space-between; align-items: baseline;\n  border-bottom: 1px solid var(--rule);\n  padding-bottom: 14px; margin-bottom: 18px;\n}\n.voice .hd .t { font-family: var(--serif); font-size: 26px; font-weight: 400; }\n.voice .hd .badge {\n  font-family: var(--mono); font-size: 10px;\n  letter-spacing: 0.2em; text-transform: uppercase;\n}\n.voice .yes .badge { color: var(--perejil); }\n.voice .no  .badge { color: var(--tomate); }\n.voice ul { list-style: none; padding: 0; margin: 0; }\n.voice li {\n  padding: 12px 0; font-family: var(--serif);\n  font-style: italic; font-size: 18px; line-height: 1.45;\n  color: color-mix(in oklch, var(--ink) 88%, transparent);\n  border-top: 1px dashed var(--rule);\n}\n.voice li:first-child { border-top: 0; }\n\n/* ICONOS */\n.icon-grid {\n  display: grid; grid-template-columns: repeat(6, 1fr); gap: 0;\n  border: 1px solid var(--rule); background: var(--paper-2);\n}\n.icon-cell {\n  aspect-ratio: 1; display: grid; place-items: center;\n  border-right: 1px solid var(--rule);\n  border-bottom: 1px solid var(--rule);\n  position: relative;\n}\n.icon-cell:nth-child(6n) { border-right: 0; }\n.icon-cell:nth-last-child(-n+6) { border-bottom: 0; }\n.icon-cell svg { width: 44px; height: 44px; color: var(--ink); }\n.icon-cell .cap {\n  position: absolute; bottom: 12px;\n  font-family: var(--mono); font-size: 9.5px;\n  letter-spacing: 0.12em; text-transform: uppercase;\n  color: color-mix(in oklch, var(--ink) 55%, transparent);\n}\n\n/* TEXTURAS */\n.tex-grid {\n  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;\n}\n.tex {\n  aspect-ratio: 4 / 5;\n  border: 1px solid var(--rule);\n  position: relative; overflow: hidden;\n}\n.tex .lbl {\n  position: absolute; bottom: 0; left: 0; right: 0;\n  background: color-mix(in oklch, var(--ink) 88%, transparent);\n  color: var(--paper); padding: 12px 14px;\n  font-family: var(--mono); font-size: 10.5px;\n  letter-spacing: 0.16em; text-transform: uppercase;\n  display: flex; justify-content: space-between;\n}\n.tex-papel {\n  background:\n    repeating-linear-gradient(0deg, transparent 0 3px, rgba(60,40,20,0.025) 3px 4px),\n    radial-gradient(ellipse at 30% 20%, rgba(80,55,30,0.07), transparent 60%),\n    var(--paper-2);\n}\n.tex-lino {\n  background:\n    repeating-linear-gradient(45deg, color-mix(in oklch, var(--bone) 88%, transparent) 0 4px, color-mix(in oklch, var(--cream) 92%, transparent) 4px 8px),\n    var(--cream);\n}\n.tex-madera {\n  background:\n    repeating-linear-gradient(85deg,\n      color-mix(in oklch, var(--cocoa) 88%, transparent) 0 6px,\n      color-mix(in oklch, var(--mahogany) 70%, transparent) 6px 9px,\n      color-mix(in oklch, var(--cocoa) 92%, transparent) 9px 18px),\n    var(--cocoa);\n}\n.tex-marmol {\n  background:\n    radial-gradient(ellipse 60% 30% at 30% 40%, color-mix(in oklch, var(--bone) 70%, transparent), transparent ont-family: var(--mono); font-size: 10px;\n  letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--mahogany);\n}\n.app-stage {\n  background: var(--paper); border: 1px solid var(--rule);\n  aspect-ratio: 4 / 5; position: relative; overflow: hidden;\n}\n\n/* Menú mockup */\n.menu-doc {\n  height: 100%; padding: 36px 32px;\n  display: flex; flex-direction: column;\n  position: relative; background: var(--paper);\n}\n.menu-doc::before {\n  content: \"\"; position: absolute; inset: 16px;\n  border: 1px solid var(--rule); pointer-events: none;\n}\n.menu-doc .top {\n  text-align: center; padding-bottom: 18px;\n  border-bottom: 1px solid var(--rule); margin-bottom: 22px;\n}\n.menu-doc .top img { max-height: 70px; width: auto; margin: 0 auto; }\n.menu-doc .top .name {\n  font-family: var(--mono); font-size: 9px;\n  letter-spacing: 0.32em; text-transform: uppercase;\n  margin-top: 10px;\n}\n.menu-doc .sec-h {\n  font-family: var(--mono); font-size: 9px;\n  letter-spacing: 0.32em; text-transform: uppercase;\n  color: var(--mahogany); text-align: center;\n  margin: 14px 0 12px;\n}\n.menu-doc .item {\n  display: grid; grid-template-columns: 1fr auto;\n  gap: 12px; align-items: baseline; padding: 7px 0;\n}\n.menu-doc .item .nm {\n  font-family: var(--serif); font-size: 15px; font-weight: 400;\n}\n.menu-doc .item .nm em { font-style: italic; color: var(--mahogany); }\n.menu-doc .item .desc {\n  font-family: var(--serif); font-style: italic;\n  font-size: 11px; line-height: 1.4; margin-top: 2px;\n  color: color-mix(in oklch, var(--ink) 65%, transparent);\n}\n.menu-doc .item .px {\n  font-family: var(--mono); font-size: 11px;\n  letter-spacing: 0.04em;\n}\n\n/* IG mockup */\n.ig {\n  aspect-ratio: 1; position: relative; overflow: hidden;\n  background: var(--paper);\n}\n.ig.dark { background: var(--ink); color: var(--paper); }\n.ig .quote {\n  position: absolute; inset: 32px;\n  display: grid; align-content: center;\n  font-family: var(--serif); font-style: italic;\n nt), transparent 60%);\n}\n.mast-inner { max-width: var(--maxw-doc); margin: 0 auto; position: relative; }\n.mast-top {\n  display: flex; justify-content: space-between; align-items: baseline;\n  font-family: var(--mono); font-size: 11px;\n  letter-spacing: 0.2em; text-transform: uppercase;\n  color: color-mix(in oklch, var(--paper) 62%, transparent);\n  border-bottom: 1px solid color-mix(in oklch, var(--paper) 22%, transparent);\n  padding-bottom: 18px; flex-wrap: wrap; gap: 12px;\n}\n.mast-title {\n  font-family: var(--serif); font-weight: 300;\n  font-size: clamp(52px, 7vw, 104px); line-height: 0.92;\n  letter-spacing: -0.02em; margin: 40px 0 0; text-wrap: balance;\n}\n.mast-title em { font-style: italic; color: color-mix(in oklch, var(--saffron) 92%, var(--paper)); }\n.mast-lede {\n  font-family: var(--serif); font-style: italic; font-weight: 300;\n  font-size: clamp(19px, 1.7vw, 25px); line-height: 1.45;\n  color: color-mix(in oklch, var(--paper) 82%, transparent);\n  max-width: 58ch; margin: 28px 0 0; text-wrap: pretty;\n}\n.mast-meta {\n  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;\n  margin-top: 48px;\n  border-top: 1px solid color-mix(in oklch, var(--paper) 22%, transparent);\n}\n.mast-meta > div {\n  padding: 22px 26px 4px 0;\n  border-right: 1px solid color-mix(in oklch, var(--paper) 14%, transparent);\n  padding-left: 26px;\n}\n.mast-meta > div:first-child { padding-left: 0; }\n.mast-meta > div:last-child { border-right: 0; }\n.mast-meta .k {\n  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;\n  text-transform: uppercase; color: color-mix(in oklch, var(--saffron) 85%, var(--paper));\n  margin-bottom: 8px;\n}\n.mast-meta .v {\n  font-family: var(--serif); font-size: 21px; font-weight: 300;\n  color: color-mix(in oklch, var(--paper) 92%, transparent); line-height: 1.2;\n}\n\n/* ---------- BLOCKS ---------- */\n.block { padding: 76px 0 0; }\n.block-head { margin-bottom: 40px; }\n.eyebrow {\n  font-family: var(--mono); font-size: 11px; font-weight: 500;\n  letter-spacing: 0.18em; text-transform: uppercase;\n  color: color-mix(in oklch, var(--ink) 58%, transparent);\n}\n.eyebrow .num { color: var(--mahogany); margin-right: 14px; }\n.block-title {\n  font-family: var(--serif); font-weight: 300;\n  font-size: clamp(34px, 4vw, 52px); line-height: 1; letter-spacing: -0.015em;\n  margin: 18px 0 0; text-wrap: balance;\n}\n.block-title em { font-style: italic; color: var(--mahogany); }\n.block-lede {\n  font-family: var(--serif); font-style: italic; font-weight: 400;\n  font-size: 19px; line-height: 1.5; max-width: 62ch; margin: 20px 0 0;\n  color: color-mix(in oklch, var(--ink) 76%, transparent); text-wrap: pretty;\n}\n\n/* ---------- OBJETIVOS ---------- */\n.goals { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid var(--rule); }\n.goals > div { padding: 30px 32px; }\n.goals > div + div { border-left: 1px solid var(--rule); }\n.goals .tag {\n  font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em;\n  text-transform: uppercase; margin-bottom: 14px; display: inline-block;\n}\n.goals .g-crecer .tag { color: var(--saffron); }\n.goals .g-fidelizar .tag { color: var(--perejil); }\n.goals h3 {\n  font-family: var(--serif); font-weight: 300; font-size: 30px;\n  margin: 0 0 12px; letter-spacing: -0.005em; line-height: 1.05;\n}\n.goals h3 em { font-style: italic; color: var(--mahogany); }\n.goals p { font-size: 14.5px; line-height: 1.6; margin: 0 0 18px;\n  color: color-mix(in oklch, var(--ink) 80%, transparent); }\n.kpi { display: flex; gap: 26px; flex-wrap: wrap; border-top: 1px solid var(--rule); padding-top: 16px; }\n.kpi .item .n { font-family: var(--serif); font-size: 30px; font-weight: 400; line-height: 1; }\n.kpi .item .n em { font-style: italic; color: var(--mahogany); }\n.kpi .item .l { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;\n  text-transform: uppercase; color: color-mix(in oklch, var(--ink) 58%, transparent); margin-top: 6px; }\n\n/* ---------- PILARES ---------- */\n.pillars { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0;\n  border: 1px solid var(--rule); border-bottom: 0; }\n.pillar { padding: 26px 22px 24px; border-right: 1px solid var(--rule);\n  border-bottom: 1px solid var(--rule); display: flex; flex-direction: column; }\n.pillar:last-child { border-right: 0; }\n.pillar .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--pc); margin-bottom: 16px; }\n.pillar .pn { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em;\n  text-transform: uppercase; color: color-mix(in oklch, var(--ink) 52%, transparent); margin-bottom: 6px; }\n.pillar h4 { font-family: var(--serif); font-weight: 400; font-size: 22px; margin: 0 0 10px;\n  line-height: 1.05; letter-spacing: -0.005em; }\n.pillar h4 em { font-style: italic; color: var(--mahogany); }\n.pillar p { font-size: 13px; line-height: 1.55; margin: 0 0 16px;\n  color: color-mix(in oklch, var(--ink) 74%, transparent); flex: 1; }\n.pillar .pct { font-family: var(--serif); font-size: 34px; font-weight: 300; line-height: 1; }\n.pillar .pct small { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em;\n  text-transform: uppercase; color: color-mix(in oklch, var(--ink) 55%, transparent); display: block; margin-top: 4px; }\n\n/* pillar colors */\n.p-casa     { --pc: var(--cocoa); }\n.p-oficio   { --pc: var(--perejil); }\n.p-autor    { --pc: var(--espresso); }\n.p-producto { --pc: var(--saffron); }\n.p-comunidad{ --pc: var(--terracotta); }\n\n/* ---------- MEZCLA / FORMATOS ---------- */\n.mix { display: grid; grid-template-columns: 1.1fr 1fr; gap: 40px; align-items: start; }\n.mix-table { width: 100%; border-collapse: collapse; }\n.mix-table td { padding: 14px 0; border-top: 1px solid var(--rule); vertical-align: baseline; }\n.mix-table tr:first-child td { border-top: 0; }\n.mix-table .fmt-name { font-family: var(--serif); font-size: 20px; font-weight: 400; width: 32%; }\n.mix-table .fmt-role { font-size: 13.5px; line-height: 1.5;\n  color: color-mix(in oklch, var(--ink) 76%, transparent); }\n.mix-table .fmt-freq { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;\n  text-align: right; white-space: nowrap; color: var(--mahogany); width: 20%; }\n.cadence { background: var(--paper-2); border: 1px solid var(--rule); padding: 28px 30px; }\n.cadence h4 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;\n  text-transform: uppercase; color: var(--mahogany); margin: 0 0 18px; }\n.cadence .row { display: flex; justify-content: space-between; gap: 16px;\n  padding: 11px 0; border-top: 1px dashed var(--rule); font-size: 14px; }\n.cadence .row:first-of-type { border-top: 0; }\n.cadence .row .d { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;\n  text-transform: uppercase; color: color-mix(in oklch, var(--ink) 58%, transparent); min-width: 70px; }\n.cadence .row .t { font-family: var(--serif); font-style: italic; font-size: 16px; text-align: right; }\n\n/* ---------- ANCHORS ---------- */\n.anchors { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;\n  border: 1px solid var(--rule); }\n.anchor { padding: 28px 28px 30px; border-right: 1px solid var(--rule); position: relative; }\n.anchor:last-child { border-right: 0; }\n.anchor .date {\n  font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;\n  text-transform: uppercase; color: var(--terracotta); margin-bottom: 16px;\n  display: flex; align-items: center; gap: 10px;\n}\n.anchor .date .sq { width: 8px; height: 8px; background: var(--terracotta); }\n.anchor h4 { font-family: var(--serif); font-weight: 300; font-size: 28px; margin: 0 0 12px;\n  line-height: 1.05; letter-spacing: -0.005em; }\n.anchor h4 em { font-style: italic; color: var(--mahogany); }\n.anchor p { font-size: 14px; line-height: 1.6; margin: 0;\n  color: color-mix(in oklch, var(--ink) 80%, transparent); }\n.anchor .tactics { list-style: none; padding: 16px 0 0; margin: 16px 0 0;\n  border-top: 1px solid var(--rule); }\n.anchor .tactics li { font-family: var(--serif); font-style: italic; font-size: 15px;\n  line-height: 1.4; padding: 6px 0 6px 18px; position: relative;\n  color: color-mix(in oklch, var(--ink) 85%, transparent); }\n.anchor .tactics li::before { content: \"—\"; position: absolute; left: 0; color: var(--mahogany); }\n\n/* ---------- LEGEND ---------- */\n.legend { display: flex; flex-wrap: wrap; gap: 26px 34px; align-items: center;\n  padding: 22px 28px; background: var(--paper-2); border: 1px solid var(--rule); }\n.legend .grp { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }\n.legend .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em;\n  text-transform: uppercase; color: color-mix(in oklch, var(--ink) 52%, transparent); }\n.legend .key { display: inline-flex; align-items: center; gap: 7px;\n  font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;\n  color: color-mix(in oklch, var(--ink) 78%, transparent); }\n.legend .key .sw { width: 11px; height: 11px; border-radius: 50%; }\n\n/* ---------- WEEK ---------- */\n.week { margin-top: 56px; }\n.week-head { display: flex; align-items: baseline; justify-content: space-between;\n  gap: 18px; padding-bottom: 14px; border-bottom: 2px solid var(--ink); flex-wrap: wrap; }\n.week-head .wn { font-family: var(--serif); font-weight: 300; font-size: 30px;\n  letter-spacing: -0.01em; }\n.week-head .wn em { font-style: italic; color: var(--mahogany); }\n.week-head .wr { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;\n  text-transform: uppercase; color: color-mix(in oklch, var(--ink) 58%, transparent); }\n.week-head .wtheme { font-family: var(--serif); font-style: italic; font-size: 17px;\n  color: var(--mahogany); }\n\n/* ---------- POST ROW ---------- */\n.post { display: grid;\n  grid-template-columns: 66px 116px 1fr 168px; gap: 24px;\n  padding: 26px 0; border-bottom: 1px solid var(--rule); align-items: start; }\n.post:hover { background: color-mix(in oklch, var(--cream) 28%, transparent); }\n\n.when { text-align: left; padding-top: 2px; }\n.when .dnum { font-family: var(--serif); font-weight: 300; font-size: 46px; line-height: 0.82;\n  letter-spacing: -0.02em; }\n.when .dmeta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em;\n  text-transform: uppercase; color: var(--mahogany); margin-top: 8px; line-height: 1.5; }\n\n.thumb { aspect-ratio: 4/5; overflow: hidden; border: 1px solid var(--rule); background: var(--linen); }\n.thumb img { width: 100%; height: 100%; object-fit: cover; filter: saturate(0.94) contrast(1.02); }\n\n.body .row-top { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }\n.chip { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.12em;\n  text-transform: uppercase; padding: 4px 9px; border: 1px solid var(--rule-strong);\n  color: color-mix(in oklch, var(--ink) 70%, transparent); white-space: nowrap; }\n.chip.submarca { color: var(--ink); border-color: var(--ink);\n  background: color-mix(in oklch, var(--ink) 6%, transparent); }\n.chip.pilar { border: 0; color: var(--paper); }\n.chip.pilar::before { content: \"\"; }\n.chip.pilar.p-casa     { background: var(--cocoa); }\n.chip.pilar.p-oficio   { background: var(--perejil); }\n.chip.pilar.p-autor    { background: var(--espresso); }\n.chip.pilar.p-producto { background: var(--saffron); color: var(--ink); }\n.chip.pilar.p-comunidad{ background: var(--terracotta); }\n.fmt { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.16em;\n  text-transform: uppercase; color: var(--mahogany); margin-left: auto;\n  border-bottom: 1px solid var(--mahogany); padding-bottom: 2px; }\n\n.concepto { font-family: var(--serif); font-weight: 400; font-size: 25px;\n  line-height: 1.12; letter-spacing: -0.005em; margin: 0 0 8px; }\n.concepto em { font-style: italic; color: var(--mahogany); }\n.idea { font-size: 14px; line-height: 1.58; margin: 0 0 12px;\n  color: color-mix(in oklch, var(--ink) 78%, transparent); max-width: 64ch; }\n.copy { font-family: var(--serif); font-style: italic; font-size: 16px; line-height: 1.45;\n  margin: 0; padding-left: 16px; border-left: 2px solid var(--rule-strong);\n  color: color-mix(in oklch, var(--ink) 88%, transparent); max-width: 60ch; }\n\n.meta { display: flex; flex-direction: column; gap: 12px; align-items: flex-start; padding-top: 2px; }\n.obj { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;\n  text-transform: uppercase; padding: 5px 11px; border-radius: 999px; }\n.obj.o-crecer { background: color-mix(in oklch, var(--saffron) 22%, transparent);\n  color: color-mix(in oklch, var(--saffron) 60%, var(--ink)); border: 1px solid color-mix(in oklch, var(--saffron) 55%, transparent); }\n.obj.o-fidelizar { background: color-mix(in oklch, var(--perejil) 20%, transparent);\n  color: var(--perejil); border: 1px solid color-mix(in oklch, var(--perejil) 55%, transparent); }\n.obj.o-vender { background: color-mix(in oklch, var(--tomate) 18%, transparent);\n  color: var(--tomate); border: 1px solid color-mix(in oklch, var(--tomate) 50%, transparent); }\n.meta .cta { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em;\n  line-height: 1.5; color: color-mix(in oklch, var(--ink) 72%, transparent); }\n.meta .cta b { color: var(--mahogany); font-weight: 500; display: block;\n  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 3px; }\n\n/* ---------- RECURRENTES ---------- */\n.recur { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;\n  border: 1px solid var(--rule); }\n.recur > div { padding: 28px 28px 30px; border-right: 1px solid var(--rule); }\n.recur > div:last-child { border-right: 0; }\n.recur .rh { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }\n.recur .rh .t { font-family: var(--serif); font-weight: 400; font-size: 23px; }\n.recur .rh .f { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;\n  text-transform: uppercase; color: var(--mahogany); }\n.recur ul { list-style: none; padding: 0; margin: 0; }\n.recur li { padding: 10px 0; border-top: 1px dashed var(--rule); font-size: 14px; line-height: 1.5; }\n.recur li:first-child { border-top: 0; }\n.recur li b { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;\n  text-transform: uppercase; color: color-mix(in oklch, var(--ink) 55%, transparent);\n  display: inline-block; min-width: 78px; }\n\n/* ---------- BANCO ---------- */\n.bank { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; align-items: start; }\n.tags { display: flex; flex-wrap: wrap; gap: 9px; }\n.tags .t { font-family: var(--mono); font-size: 12px; letter-spacing: 0.02em;\n  padding: 7px 13px; border: 1px solid var(--rule-strong);\n  color: var(--mahogany); }\n.tags .t.muted { color: color-mix(in oklch, var(--ink) 60%, transparent); border-color: var(--rule); }\n.subhead { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;\n  text-transform: uppercase; color: var(--mahogany); margin: 0 0 18px; }\n.cta-list { list-style: none; padding: 0; margin: 0; }\n.cta-list li { font-family: var(--serif); font-style: italic; font-size: 17px; line-height: 1.4;\n  padding: 10px 0; border-top: 1px dashed var(--rule);\n  color: color-mix(in oklch, var(--ink) 88%, transparent); }\n.cta-list li:first-child { border-top: 0; }\n.hours { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--rule); }\n.hours .row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 14px; }\n.hours .row .d { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;\n  text-transform: uppercase; color: color-mix(in oklch, var(--ink) 58%, transparent); }\n.hours .row .h { font-family: var(--serif); font-style: italic; font-size: 16px; }\n\n/* ---------- COLOFON ---------- */\n.colofon-doc { text-align: center; padding: 96px 0 24px; }\n.colofon-doc .mk { font-family: var(--serif); font-style: italic; font-weight: 300;\n  font-size: 88px; line-height: 1; color: var(--mahogany); }\n.colofon-doc .mt { font-family: var(--mono); font-size: 10px; letter-spacing: 0.26em;\n  text-transform: uppercase; margin-top: 22px; color: color-mix(in oklch, var(--ink) 58%, transparent); }\n\n/* ---------- RESPONSIVE ---------- */\n@media (max-width: 860px) {\n  :root { --pad-doc: 28px; }\n  .mast-meta, .pillars, .anchors, .recur, .goals { grid-template-columns: 1fr; }\n  .mast-meta > div, .pillar, .anchor, .recur > div { border-right: 0; }\n  .mix, .bank { grid-template-columns: 1fr; }\n  .post { grid-template-columns: 54px 1fr; grid-template-areas: \"when body\" \"thumb body\" \"meta meta\"; gap: 14px 18px; }\n  .post .when { grid-area: when; } .post .thumb { grid-area: thumb; max-width: 120px; }\n  .post .body { grid-area: body; } .post .meta { grid-area: meta; flex-direction: row; align-items: center; }\n  .fmt { margin-left: 0; }\n}\n\n/* ---------- PRINT ---------- */\n@media print {\n  body::before { display: none; }\n  .doc { max-width: none; padding: 0 24px; }\n  .masthead { padding: 36px 24px; }\n  .post { break-inside: avoid; }\n  .anchor, .pillar, .recur > div { break-inside: avoid; }\n  .week { break-inside: auto; }\n  .post:hover { background: none; }\n}\n<\u002Fstyle>\n<style>/* TERTULIANOS · Calendario de Efemérides — estilos de documento\n   Hereda tokens y el armazón de doc (masthead, block, eyebrow) de\n   brand.css + matriz.css. Aquí sólo viven los componentes propios:\n   leyenda de prioridad, cabecera de mes y fila de efeméride. */\n\n/* ---------- LEYENDA DE PRIORIDAD ---------- */\n.prio-legend {\n  display: grid; grid-template-columns: repeat(3, 1fr);\n  border: 1px solid var(--rule);\n}\n.prio-legend > div { padding: 28px 28px 30px; border-right: 1px solid var(--rule); }\n.prio-legend > div:last-child { border-right: 0; }\n.prio-legend .prio { margin-bottom: 16px; }\n.prio-legend p {\n  font-size: 14px; line-height: 1.55; margin: 0;\n  color: color-mix(in oklch, var(--ink) 78%, transparent);\n}\n\n.prio {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em;\n  text-transform: uppercase; padding: 6px 13px; border-radius: 999px;\n  white-space: nowrap;\n}\n.prio .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex: none; }\n.prio-alta {\n  background: color-mix(in oklch, var(--tomate) 14%, transparent);\n  color: var(--tomate);\n  border: 1px solid color-mix(in oklch, var(--tomate) 45%, transparent);\n}\n.prio-media {\n  background: color-mix(in oklch, var(--saffron) 20%, transparent);\n  color: color-mix(in oklch, var(--saffron) 55%, var(--ink));\n  border: 1px solid color-mix(in oklch, var(--saffron) 50%, transparent);\n}\n.prio-contexto {\n  background: transparent;\n  color: color-mix(in oklch, var(--ink) 55%, transparent);\n  border: 1px solid var(--rule-strong);\n}\n\n/* ---------- MES ---------- */\n.month { margin-top: 64px; }\n.month:first-of-type { margin-top: 0; }\n.month-head {\n  display: flex; align-items: baseline; justify-content: space-between;\n  gap: 18px; padding-bottom: 14px; border-bottom: 2px solid var(--ink);\n  flex-wrap: wrap;\n}\n.month-head .mn {\n  font-family: var(--serif); font-weight: 300; font-size: 32px;\n  letter-spacing: -0.01em; text-transform: capitalize;\n}\n.month-head .mn em { font-style: italic; color: var(--mahogany); }\n.month-head .mtheme { font-family: var(--serif); font-style: italic; font-size: 17px; color: var(--mahogany); }\n.month-head .mcount {\n  font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;\n  text-transform: uppercase; color: color-mix(in oklch, var(--ink) 58%, transparent);\n}\n.month-note {\n  font-family: var(--serif); font-style: italic; font-size: 15px; line-height: 1.5;\n  color: color-mix(in oklch, var(--ink) 75%, transparent);\n  margin: 16px 0 0; max-width: 62ch;\n}\n\n/* ---------- FILA DE EFEMÉRIDE ---------- */\n.efem-row {\n  display: grid; grid-template-columns: 84px 1fr 152px; gap: 24px;\n  padding: 24px 0; border-bottom: 1px solid var(--rule);\n  align-items: start;\n}\n.month-head + .efem-row { padding-top: 26px; }\n.efem-row:hover { background: color-mix(in oklch, var(--cream) 28%, transparent); }\n\n.efem-date { padding-top: 3px; }\n.efem-date .dnum {\n  font-family: var(--serif); font-weight: 300; font-size: 38px;\n  line-height: 0.85; letter-spacing: -0.02em;\n}\n.efem-date .dmeta {\n  font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;\n  text-transform: uppercase; color: var(--mahogany); margin-top: 7px;\n}\n.efem-date .dtext {\n  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;\n  text-transform: uppercase; line-height: 1.5; color: var(--mahogany);\n  max-width: 74px; padding-top: 6px;\n}\n\n.efem-name {\n  font-family: var(--serif); font-weight: 400; font-size: 21px;\n  line-height: 1.2; letter-spacing: -0.005em; margin: 0 0 8px;\n}\n.efem-name em { font-style: italic; color: var(--mahogany); }\n.efem-angle {\n  font-size: 14px; line-height: 1.58; margin: 0;\n  color: color-mix(in oklch, var(--ink) 78%, transparent);\n  max-width: 60ch;\n}\n\n.efem-prio { justify-self: end; text-align: right; padding-top: 5px; }\n\n/* ---------- RESPONSIVE ---------- */\n@media (max-width: 860px) {\n  .prio-legend { grid-template-columns: 1fr; }\n  .prio-legend > div { border-right: 0; border-bottom: 1px solid var(--rule); }\n  .prio-legend > div:last-child { border-bottom: 0; }\n\n  .efem-row {\n    grid-template-columns: 56px 1fr;\n    grid-template-areas: \"date body\" \"prio prio\";\n    gap: 6px 16px; padding: 20px 0;\n  }\n  .efem-row .efem-date { grid-area: date; }\n  .efem-row .efem-body { grid-area: body; }\n  .efem-row .efem-prio { grid-area: prio; justify-self: start; text-align: left; margin-top: 8px; padding-top: 0; }\n  .efem-date .dnum { font-size: 30px; }\n}\n\n/* ---------- PRINT ---------- */\n@media print {\n  .month { break-inside: auto; }\n  .efem-row { break-inside: avoid; }\n  .efem-row:hover { background: none; }\n  .prio-legend > div { break-inside: avoid; }\n}\n<\u002Fstyle>\n<style>\n  a { color: var(--mahogany); text-underline-offset: 2px; }\n  a:hover { color: var(--ink); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ============ MASTHEAD ============ -->\n<header class=\"masthead\" data-screen-label=\"00 Portada\">\n  <div class=\"mast-inner\">\n    <div class=\"mast-top\">\n      <span>Grupo Culinario Tertulianos · Calendario editorial<\u002Fspan>\n      <span>Quetzaltenango · Guatemala<\u002Fspan>\n    <\u002Fdiv>\n    <h1 class=\"mast-title\">Calendario de <em>efemérides<\u002Fem>.<br>Segundo semestre — 2026.<\u002Fh1>\n    <p class=\"mast-lede\">Veinticuatro fechas para no llegar tarde a la conversación — gremiales, patrias y culinarias — cada una con el ángulo justo para contarla desde la mesa de Tertulianos. De julio a diciembre, en el orden en que hay que planearlas.<\u002Fp>\n\n    <div class=\"mast-meta\">\n      <div><div class=\"k\">Periodo<\u002Fdiv><div class=\"v\">Julio – diciembre 2026<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"k\">Fechas mapeadas<\u002Fdiv><div class=\"v\">24 en total<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"k\">Prioridad alta<\u002Fdiv><div class=\"v\">12 fechas<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"k\">Fuente<\u002Fdiv><div class=\"v\">VeeTee Creative<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"doc\">\n\n  <!-- ============ CÓMO LEER ============ -->\n  <section class=\"block\" data-screen-label=\"01 Prioridad\">\n    <div class=\"block-head\">\n      <div class=\"eyebrow\"><span class=\"num\">01<\u002Fspan>Cómo leer el calendario<\u002Fdiv>\n      <h2 class=\"block-title\">Tres niveles de <em>prioridad<\u002Fem>.<\u002Fh2>\n      <p class=\"block-lede\">Cada fecha trae asignado un nivel de esfuerzo, para saber de un vistazo cuánto se le invierte y con cuánta anticipación se planea.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"prio-legend\">\n      <div>\n        <span class=\"prio prio-alta\"><span class=\"dot\"><\u002Fspan>Alta<\u002Fspan>\n        <p>Diseño dedicado y anticipación. Se planea con al menos una semana de margen.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <span class=\"prio prio-media\"><span class=\"dot\"><\u002Fspan>Media<\u002Fspan>\n        <p>Post de felicitación o guiño oportuno. Formato simple, poca producción.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <span class=\"prio prio-contexto\"><span class=\"dot\"><\u002Fspan>Contexto<\u002Fspan>\n        <p>Opcional, o reservado para Stories. Se usa si el día y el tiempo lo permiten.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"cap\" style=\"margin-top:22px;\">Nota — las fechas marcadas «Variable» son móviles: confirmar el día exacto cada año antes de programar.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ============ INTRO MES A MES ============ -->\n  <section class=\"block\" data-screen-label=\"02 Calendario\">\n    <div class=\"block-head\">\n      <div class=\"eyebrow\"><span class=\"num\">02<\u002Fspan>Mes por mes<\u002Fdiv>\n      <h2 class=\"block-title\">De julio a <em>diciembre<\u002Fem>.<\u002Fh2>\n      <p class=\"block-lede\">El semestre completo, en el orden en que hay que planearlo. Cada fecha trae su ángulo — la manera en que Tertulianos puede contarla sin forzarla.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== JULIO ===== -->\n  <section class=\"month\" data-screen-label=\"Julio\">\n    <div class=\"month-head\">\n      <span class=\"mn\">Julio<\u002Fspan>\n      <span class=\"mtheme\">«Arranca el semestre»<\u002Fspan>\n      <span class=\"mcount\">1 fecha<\u002Fspan>\n    <\u002Fdiv>\n\n    <article class=\"efem-row\" data-screen-label=\"23 jul · Psicólogo\">\n      <div class=\"efem-date\"><div class=\"dnum\">23<\u002Fdiv><div class=\"dmeta\">Jul<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día del Psicólogo<\u002Fh3>\n        <p class=\"efem-angle\">Felicitación gremial.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-contexto\"><span class=\"dot\"><\u002Fspan>Contexto<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fsection>\n\n  <!-- ===== AGOSTO ===== -->\n  <section class=\"month\" data-screen-label=\"Agosto\">\n    <div class=\"month-head\">\n      <span class=\"mn\">Agosto<\u002Fspan>\n      <span class=\"mtheme\">«Felicitaciones de gremio»<\u002Fspan>\n      <span class=\"mcount\">3 fechas<\u002Fspan>\n    <\u002Fdiv>\n\n    <article class=\"efem-row\" data-screen-label=\"6 ago · Economía\">\n      <div class=\"efem-date\"><div class=\"dnum\">6<\u002Fdiv><div class=\"dmeta\">Ago<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día del Profesional de Ciencias Económicas<\u002Fh3>\n        <p class=\"efem-angle\">Felicitación gremial y corporativa.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-media\"><span class=\"dot\"><\u002Fspan>Media<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"11 ago · Nutricionista\">\n      <div class=\"efem-date\"><div class=\"dnum\">11<\u002Fdiv><div class=\"dmeta\">Ago<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día del Nutricionista<\u002Fh3>\n        <p class=\"efem-angle\">Opciones balanceadas, ingredientes frescos del huerto.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-media\"><span class=\"dot\"><\u002Fspan>Media<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"24 ago · Diseñador Gráfico\">\n      <div class=\"efem-date\"><div class=\"dnum\">24<\u002Fdiv><div class=\"dmeta\">Ago<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día del Diseñador Gráfico<\u002Fh3>\n        <p class=\"efem-angle\">Guiño creativo — el gremio propio de la casa.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-contexto\"><span class=\"dot\"><\u002Fspan>Contexto<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fsection>\n\n  <!-- ===== SEPTIEMBRE ===== -->\n  <section class=\"month\" data-screen-label=\"Septiembre\">\n    <div class=\"month-head\">\n      <span class=\"mn\">Septiembre<\u002Fspan>\n      <span class=\"mtheme\">«Mes patrio»<\u002Fspan>\n      <span class=\"mcount\">4 fechas<\u002Fspan>\n    <\u002Fdiv>\n\n    <article class=\"efem-row\" data-screen-label=\"5 sep · Arquitecto\">\n      <div class=\"efem-date\"><div class=\"dnum\">5<\u002Fdiv><div class=\"dmeta\">Sep<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día del Arquitecto<\u002Fh3>\n        <p class=\"efem-angle\">Villa Lesbia: arquitectura histórica del siglo XIX.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-media\"><span class=\"dot\"><\u002Fspan>Media<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"15 sep · Independencia\">\n      <div class=\"efem-date\"><div class=\"dnum\">15<\u002Fdiv><div class=\"dmeta\">Sep<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Independencia de <em>Guatemala<\u002Fem><\u002Fh3>\n        <p class=\"efem-angle\">Mes patrio: cocina chapina de autor, orgullo nacional.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-alta\"><span class=\"dot\"><\u002Fspan>Alta<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"Sep · Xelafer\">\n      <div class=\"efem-date\"><div class=\"dtext\">Todo el<br>mes<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Xelafer <em>(Feria Centroamericana de la Independencia)<\u002Fem><\u002Fh3>\n        <p class=\"efem-angle\">Evento clave de Xela desde 1884 — contenido local fuerte.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-alta\"><span class=\"dot\"><\u002Fspan>Alta<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"21 sep · Camarógrafo\">\n      <div class=\"efem-date\"><div class=\"dnum\">21<\u002Fdiv><div class=\"dmeta\">Sep<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día del Camarógrafo / Fotógrafo<\u002Fh3>\n        <p class=\"efem-angle\">Detrás de cámaras de las sesiones de contenido.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-contexto\"><span class=\"dot\"><\u002Fspan>Contexto<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fsection>\n\n  <!-- ===== OCTUBRE ===== -->\n  <section class=\"month\" data-screen-label=\"Octubre\">\n    <div class=\"month-head\">\n      <span class=\"mn\">Octubre<\u002Fspan>\n      <span class=\"mtheme\">«Café, chef y memoria»<\u002Fspan>\n      <span class=\"mcount\">2 fechas<\u002Fspan>\n    <\u002Fdiv>\n\n    <article class=\"efem-row\" data-screen-label=\"1 oct · Café\">\n      <div class=\"efem-date\"><div class=\"dnum\">1<\u002Fdiv><div class=\"dmeta\">Oct<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día Internacional del <em>Café<\u002Fem><\u002Fh3>\n        <p class=\"efem-angle\">Tostaduría, Bazar del Café, métodos de preparación como el sifón japonés.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-alta\"><span class=\"dot\"><\u002Fspan>Alta<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"20 oct · Chef / Revolución\">\n      <div class=\"efem-date\"><div class=\"dnum\">20<\u002Fdiv><div class=\"dmeta\">Oct<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día del Chef / Revolución de 1944<\u002Fh3>\n        <p class=\"efem-angle\">Homenaje al chef y a la cocina de autor; también fecha histórica.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-alta\"><span class=\"dot\"><\u002Fspan>Alta<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fsection>\n\n  <!-- ===== NOVIEMBRE ===== -->\n  <section class=\"month\" data-screen-label=\"Noviembre\">\n    <div class=\"month-head\">\n      <span class=\"mn\">Noviembre<\u002Fspan>\n      <span class=\"mtheme\">«Tradición y preludio navideño»<\u002Fspan>\n      <span class=\"mcount\">3 fechas<\u002Fspan>\n    <\u002Fdiv>\n\n    <article class=\"efem-row\" data-screen-label=\"1 nov · Todos los Santos\">\n      <div class=\"efem-date\"><div class=\"dnum\">1<\u002Fdiv><div class=\"dmeta\">Nov<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día de Todos los Santos<\u002Fh3>\n        <p class=\"efem-angle\">Fiambre — el plato icónico chapín, tradición y familia.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-alta\"><span class=\"dot\"><\u002Fspan>Alta<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"30 nov · Periodista\">\n      <div class=\"efem-date\"><div class=\"dnum\">30<\u002Fdiv><div class=\"dmeta\">Nov<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día del Periodista<\u002Fh3>\n        <p class=\"efem-angle\">Felicitación gremial y a la prensa local.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-contexto\"><span class=\"dot\"><\u002Fspan>Contexto<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"Nov · Temporada navideña\">\n      <div class=\"efem-date\"><div class=\"dtext\">Fin de<br>mes<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Inicio de <em>temporada navideña<\u002Fem><\u002Fh3>\n        <p class=\"efem-angle\">Canastas Tertulianos, cenas de empresa, apertura de reservas.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-alta\"><span class=\"dot\"><\u002Fspan>Alta<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fsection>\n\n  <!-- ===== DICIEMBRE ===== -->\n  <section class=\"month\" data-screen-label=\"Diciembre\">\n    <div class=\"month-head\">\n      <span class=\"mn\">Diciembre<\u002Fspan>\n      <span class=\"mtheme\">«Temporada alta»<\u002Fspan>\n      <span class=\"mcount\">6 fechas<\u002Fspan>\n    <\u002Fdiv>\n\n    <article class=\"efem-row\" data-screen-label=\"3 dic · Médico\">\n      <div class=\"efem-date\"><div class=\"dnum\">3<\u002Fdiv><div class=\"dmeta\">Dic<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día del Médico<\u002Fh3>\n        <p class=\"efem-angle\">Felicitación gremial (Decreto-Ley 57).<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-media\"><span class=\"dot\"><\u002Fspan>Media<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"Dic · Cenas de empresa\">\n      <div class=\"efem-date\"><div class=\"dtext\">Todo el<br>mes<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Cenas navideñas de <em>empresa<\u002Fem><\u002Fh3>\n        <p class=\"efem-angle\">Paquetes de grupo, eventos privados, convivios de fin de año.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-alta\"><span class=\"dot\"><\u002Fspan>Alta<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"12 dic · Virgen de Guadalupe\">\n      <div class=\"efem-date\"><div class=\"dnum\">12<\u002Fdiv><div class=\"dmeta\">Dic<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Virgen de Guadalupe<\u002Fh3>\n        <p class=\"efem-angle\">Tradición y cultura — el día de «la india bonita».<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-media\"><span class=\"dot\"><\u002Fspan>Media<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"24 dic · Nochebuena\">\n      <div class=\"efem-date\"><div class=\"dnum\">24<\u002Fdiv><div class=\"dmeta\">Dic<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Nochebuena<\u002Fh3>\n        <p class=\"efem-angle\">Cena navideña, canastas, tamales y ponche.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-alta\"><span class=\"dot\"><\u002Fspan>Alta<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"25 dic · Navidad\">\n      <div class=\"efem-date\"><div class=\"dnum\">25<\u002Fdiv><div class=\"dmeta\">Dic<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Navidad<\u002Fh3>\n        <p class=\"efem-angle\">Menú especial, familia, experiencia completa.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-alta\"><span class=\"dot\"><\u002Fspan>Alta<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"31 dic · Fin de Año\">\n      <div class=\"efem-date\"><div class=\"dnum\">31<\u002Fdiv><div class=\"dmeta\">Dic<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Fin de Año<\u002Fh3>\n        <p class=\"efem-angle\">Cena de gala, brindis y Vanta Cava — celebración premium.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-alta\"><span class=\"dot\"><\u002Fspan>Alta<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fsection>\n\n  <!-- ===== FECHAS CULINARIAS INTERNACIONALES ===== -->\n  <section class=\"month\" data-screen-label=\"Internacionales\">\n    <div class=\"month-head\">\n      <span class=\"mn\">Fechas culinarias <em>internacionales<\u002Fem><\u002Fspan>\n      <span class=\"mcount\">5 fechas<\u002Fspan>\n    <\u002Fdiv>\n    <p class=\"month-note\">Para reforzar el posicionamiento gastronómico premium de la marca — se suman a las fechas nacionales, sin sustituirlas.<\u002Fp>\n\n    <article class=\"efem-row\" data-screen-label=\"20 oct · Chef internacional\">\n      <div class=\"efem-date\"><div class=\"dnum\">20<\u002Fdiv><div class=\"dmeta\">Oct<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día Internacional del Chef<\u002Fh3>\n        <p class=\"efem-angle\">Cocina de autor: el chef y su equipo.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-alta\"><span class=\"dot\"><\u002Fspan>Alta<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"1 nov · Veganismo\">\n      <div class=\"efem-date\"><div class=\"dnum\">1<\u002Fdiv><div class=\"dmeta\">Nov<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día Mundial del Veganismo<\u002Fh3>\n        <p class=\"efem-angle\">Opciones vegetales del huerto.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-media\"><span class=\"dot\"><\u002Fspan>Media<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"3 nov · Sándwich\">\n      <div class=\"efem-date\"><div class=\"dnum\">3<\u002Fdiv><div class=\"dmeta\">Nov<\u002Fdiv><\u002Fdiv>\n      <div class=\"efem-body\">\n        <h3 class=\"efem-name\">Día Mundial del Sándwich<\u002Fh3>\n        <p class=\"efem-angle\">Guiño casual.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"efem-prio\"><span class=\"prio prio-contexto\"><span class=\"dot\"><\u002Fspan>Contexto<\u002Fspan><\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"efem-row\" data-screen-label=\"1 oct · Café internacio
